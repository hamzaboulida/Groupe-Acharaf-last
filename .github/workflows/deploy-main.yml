name: Deploy to Cloud Run (main branch)

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: g-acharaf-prod-2399
  REGION: europe-west9
  SERVICE_NAME: groupe-acharaf-prod-api
  IMAGE_NAME: europe-west9-docker.pkg.dev/g-acharaf-prod-2399/groupe-acharaf-repo/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Authorize Docker push
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
          flags: |
            --allow-unauthenticated
            --port=5000
            --memory=1024Mi
            --cpu=1
