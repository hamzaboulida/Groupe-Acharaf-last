kind = "web"
previewPath = "/"
title = "Groupe Acharaf"
version = "1.0.0"
id = "artifacts/groupe-acharaf"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19574

[services.development]
run = "pnpm --filter @workspace/groupe-acharaf run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/groupe-acharaf", "run", "build" ]
publicDir = "artifacts/groupe-acharaf/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19574"
BASE_PATH = "/"
