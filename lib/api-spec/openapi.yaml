openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Groupe Acharaf luxury real estate website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: brands
    description: Real estate brands (Estya, Acharaf Immobilier)
  - name: projects
    description: Real estate projects
  - name: articles
    description: Blog articles / Actualités
  - name: careers
    description: Job listings and applications
  - name: leads
    description: Contact form leads
  - name: stats
    description: Statistics and counters
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Brands ──────────────────────────────────────────────────────────────
  /brands:
    get:
      operationId: listBrands
      tags: [brands]
      summary: List all brands
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Brand"
    post:
      operationId: createBrand
      tags: [brands]
      summary: Create a brand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "201":
          description: Created brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"

  /brands/{id}:
    get:
      operationId: getBrand
      tags: [brands]
      summary: Get brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    put:
      operationId: updateBrand
      tags: [brands]
      summary: Update a brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrandBody"
      responses:
        "200":
          description: Updated brand
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Brand"
    delete:
      operationId: deleteBrand
      tags: [brands]
      summary: Delete a brand
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Projects ─────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects (optionally filter by brand)
      parameters:
        - name: brandId
          in: query
          required: false
          schema:
            type: integer
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [upcoming, ongoing, completed]
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /uploads:
    post:
      operationId: uploadFile
      tags: [projects]
      summary: Upload a file
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload success
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string

  # ── Articles ─────────────────────────────────────────────────────────────
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List blog articles
      parameters:
        - name: published
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    put:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Careers ──────────────────────────────────────────────────────────────
  /careers:
    get:
      operationId: listCareers
      tags: [careers]
      summary: List job listings
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Career"
    post:
      operationId: createCareer
      tags: [careers]
      summary: Create a job listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareerBody"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"

  /careers/{id}:
    get:
      operationId: getCareer
      tags: [careers]
      summary: Get job by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"
    put:
      operationId: updateCareer
      tags: [careers]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCareerBody"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Career"
    delete:
      operationId: deleteCareer
      tags: [careers]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /careers/{id}/apply:
    post:
      operationId: applyForCareer
      tags: [careers]
      summary: Submit a job application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications:
    get:
      operationId: listApplications
      tags: [careers]
      summary: List all applications (admin)
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  # ── Leads ─────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all contact leads (admin)
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Stats (wow endpoints) ─────────────────────────────────────────────────
  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get site-wide statistics for animated counters
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Brand:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        segment:
          type: string
          enum: [luxury, premium, social]
        logoUrl:
          type: string
          nullable: true
        coverImageUrl:
          type: string
          nullable: true
        accentColor:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - segment
        - createdAt

    CreateBrandBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
        description:
          type: string
        segment:
          type: string
          enum: [luxury, premium, social]
        logoUrl:
          type: string
        coverImageUrl:
          type: string
        accentColor:
          type: string
      required:
        - name
        - slug
        - segment

    Project:
      type: object
      properties:
        id:
          type: integer
        brandId:
          type: integer
        brand:
          $ref: "#/components/schemas/Brand"
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        location:
          type: string
        city:
          type: string
        status:
          type: string
          enum: [upcoming, ongoing, completed]
        priceMin:
          type: number
        priceMax:
          type: number
        surfaceMin:
          type: number
        surfaceMax:
          type: number
        deliveryDate:
          type: string
        featured:
          type: boolean
        coverImageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        tagline:
          type: string
          nullable: true
        shortDescription:
          type: string
          nullable: true
        storyTitle:
          type: string
          nullable: true
        storyText:
          type: string
          nullable: true
        lifestyleTitle:
          type: string
          nullable: true
        lifestyleText:
          type: string
          nullable: true
        locationAdvantages:
          type: array
          items:
            type: string
          nullable: true
        mapLocation:
          type: string
          nullable: true
        financingDetails:
          type: string
          nullable: true
        ctaText:
          type: string
          nullable: true
        seoTitle:
          type: string
          nullable: true
        seoDescription:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - brandId
        - title
        - slug
        - status
        - featured
        - createdAt

    CreateProjectBody:
      type: object
      properties:
        brandId:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        location:
          type: string
        city:
          type: string
        status:
          type: string
          enum: [upcoming, ongoing, completed]
        priceMin:
          type: number
        priceMax:
          type: number
        surfaceMin:
          type: number
        surfaceMax:
          type: number
        deliveryDate:
          type: string
        featured:
          type: boolean
        coverImageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        tagline:
          type: string
        shortDescription:
          type: string
        storyTitle:
          type: string
        storyText:
          type: string
        lifestyleTitle:
          type: string
        lifestyleText:
          type: string
        locationAdvantages:
          type: array
          items:
            type: string
        mapLocation:
          type: string
        financingDetails:
          type: string
        ctaText:
          type: string
        seoTitle:
          type: string
        seoDescription:
          type: string
      required:
        - brandId
        - title
        - slug
        - status

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImageUrl:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        metaTitle:
          type: string
        metaDescription:
          type: string
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - published
        - createdAt

    CreateArticleBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        coverImageUrl:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        metaTitle:
          type: string
        metaDescription:
          type: string
        published:
          type: boolean
      required:
        - title
        - slug

    Career:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        department:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [full-time, part-time, internship, freelance]
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        coverImageUrl:
          type: string
        active:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - slug
        - department
        - type
        - active
        - createdAt

    CreateCareerBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        department:
          type: string
        location:
          type: string
        type:
          type: string
          enum: [full-time, part-time, internship, freelance]
        description:
          type: string
        requirements:
          type: array
          items:
            type: string
        coverImageUrl:
          type: string
        active:
          type: boolean
        metaTitle:
          type: string
        metaDescription:
          type: string
      required:
        - title
        - slug
        - department
        - type

    Application:
      type: object
      properties:
        id:
          type: integer
        careerId:
          type: integer
        career:
          $ref: "#/components/schemas/Career"
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - careerId
        - firstName
        - lastName
        - email
        - createdAt

    CreateApplicationBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        message:
          type: string
      required:
        - firstName
        - lastName
        - email

    Lead:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
        projectInterest:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - email
        - createdAt

    CreateLeadBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
        projectInterest:
          type: string
      required:
        - firstName
        - lastName
        - email

    Stats:
      type: object
      properties:
        totalProjects:
          type: integer
        deliveredProjects:
          type: integer
        yearsExperience:
          type: integer
        totalUnits:
          type: integer
        satisfiedClients:
          type: integer
        cities:
          type: integer
      required:
        - totalProjects
        - deliveredProjects
        - yearsExperience
        - totalUnits
        - satisfiedClients
        - cities
